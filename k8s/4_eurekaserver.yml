apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka-server
  labels:
    app: eureka-server
spec:
  replicas: 1

  selector:
    matchLabels:
      app: eureka-server

  template:
    metadata:
      labels:
        app: eureka-server

    spec:
      containers:
        - name: eureka-server
          image: agentveer/eureka-server:2.0.0

          ports:
            - containerPort: 8761

          envFrom:
            - configMapRef:
                name: eventpass-configmap

          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "300Mi"
              cpu: "500m"

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 30
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: eureka-server
spec:
  selector:
    app: eureka-server

  type: ClusterIP
  ports:
    - port: 8761
      targetPort: 8761
