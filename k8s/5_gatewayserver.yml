apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-server
  labels:
    app: gateway-server

spec:
  replicas: 1

  selector:
    matchLabels:
      app: gateway-server

  template:
    metadata:
      labels:
        app: gateway-server

    spec:
      containers:
        - name: gateway-server
          image: agentveer/gateway-server:2.0.0

          ports:
            - containerPort: 8080

          envFrom:
            - configMapRef:
                name: eventpass-configmap

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "300Mi"

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-server

spec:
  selector:
    app: gateway-server

  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080