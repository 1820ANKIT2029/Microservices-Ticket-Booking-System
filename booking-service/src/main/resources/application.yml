server:
  port: 8082
  forward-headers-strategy: framework

spring:
  application:
    name: 'booking-service'
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password: ''
  h2:
    console:
      enabled: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

  cloud:
    openfeign:
      circuitbreaker:
        enabled: true

    config:
      enabled: true
      uri: "optional:configserver:http://localhost:8888/"

    function:
      definition: paymentSuccess;paymentFailure

    stream:
      bindings:
        paymentSuccess-in-0:
          destination: payment-success-topic
          group: booking-service

        paymentFailure-in-0:
          destination: payment-failure-topic
          group: booking-service

        notification-out-0:
          destination: notification-topic

      kafka:
        binder:
          brokers: localhost:9092

  config:
    import: optional:configserver:http://localhost:8888/

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost

logging:
  level:
    org.springframework.cloud.openfeign: DEBUG
    feign: DEBUG