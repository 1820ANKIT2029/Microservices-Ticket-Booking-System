server:
  port: 8082
  forward-headers-strategy: framework

spring:
  application:
    name: 'booking-service'
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password: ''
  h2:
    console:
      enabled: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

  cloud:
    openfeign:
      circuitbreaker:
        enabled: true

    stream:
      bindings:
        paymentSuccess-in-0:
          destination: payment-success-topic
          group: booking-service
          consumer:
            max-attempts: 3

        paymentFailure-in-0:
          destination: payment-failure-topic
          group: booking-service
          consumer:
            max-attempts: 3

        notification-out-0:
          destination: notification-topic

      kafka:
        binder:
          brokers: localhost:9092

        bindings:
          paymentSuccess-in-0:
            consumer:
              enable-dlq: true
              dlq-name: payment-failure-topic-dlq

          paymentFailure-in-0:
            consumer:
              enable-dlq: true
              dlq-name: payment-failure-topic-dlq

    config:
      enabled: true
      fail-fast: true
      retry:
        initial-interval: 2000
        multiplier: 1.5
        max-interval: 10000
        max-attempts: 10
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost

logging:
  level:
    org.springframework.cloud.openfeign: DEBUG
    feign: DEBUG