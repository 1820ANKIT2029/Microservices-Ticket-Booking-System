server:
  port: 8087

spring:
  application:
    name: 'gateway-service'
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  cloud:
    gateway:
      server:
        webflux:
          default-filters:
            # FILTER 1: Per-User Limit (Fair Use)
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userIdKeyResolver}"

            # FILTER 2: Global System Limit (Circuit Breaker)
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 500
                redis-rate-limiter.burstCapacity: 800
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@globalKeyResolver}"

          routes:
            - id: event-service
              uri: lb://EVENT-SERVICE
              predicates:
                - Path=/event/**
              filters:
                - RewritePath=/event/(?<segment>.*), /${segment}

            - id: booking-service
              uri: lb://BOOKING-SERVICE
              predicates:
                - Path=/booking/**
              filters:
                - RewritePath=/booking/(?<segment>.*), /${segment}

            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/user/**,/auth/**
              filters:
                - RewritePath=/user/(?<segment>.*), /${segment}

            - id: payment-service
              uri: lb://PAYMENT-SERVICE
              predicates:
                - Path=/payment/**
              filters:
                - RewritePath=/payment/(?<segment>.*), /${segment}

            - id: notification-service
              uri: lb://NOTIFICATION-SERVICE
              predicates:
                - Path=/notification/**
              filters:
                - RewritePath=/notification/(?<segment>.*), /${segment}

            - id: search-service
              uri: lb://SEARCH-SERVICE
              predicates:
                - Path=/search/**
              filters:
                - RewritePath=/search/(?<segment>.*), /${segment}

            - id: analytics-service
              uri: lb://ANALYTICS-SERVICE
              predicates:
                - Path=/analytics/**
              filters:
                - RewritePath=/analytics/(?<segment>.*), /${segment}
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:3000"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders:
                  - "*"
                allowCredentials: true

    config:
      enabled: true
      uri: "optional:configserver:http://localhost:8888/"
  config:
    import: optional:configserver:http://localhost:8888/

  data:
    redis:
      host: localhost
      port: 6379

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost

# openssl rand -hex 32
jwt:
  secret: ${JWT_SECRET:82a3beb52b097b3fab2628cb35162a4c767833a91c257a16f6ec69de88b98284}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Event Service
        url: /event/v3/api-docs
      - name: Booking Service
        url: /booking/v3/api-docs
      - name: User Service
        url: /user/v3/api-docs
      - name: Payment Service
        url: /payment/v3/api-docs
      - name: Notification Service
        url: /notification/v3/api-docs
      - name: Search Service
        url: /search/v3/api-docs
      - name: Analytics Service
        url: /analytics/v3/api-docs