server:
  port: 8087

spring:
  application:
    name: 'gateway-service'

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: event-service
              uri: lb://EVENT-SERVICE
              predicates:
                - Path=/event/**
              filters:
                - RewritePath=/event/(?<segment>.*), /${segment}

            - id: booking-service
              uri: lb://BOOKING-SERVICE
              predicates:
                - Path=/booking/**
              filters:
                - RewritePath=/booking/(?<segment>.*), /${segment}

            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/user/**,/auth/**
              filters:
                - RewritePath=/user/(?<segment>.*), /${segment}

            - id: payment-service
              uri: lb://PAYMENT-SERVICE
              predicates:
                - Path=/payment/**
              filters:
                - RewritePath=/payment/(?<segment>.*), /${segment}

            - id: notification-service
              uri: lb://NOTIFICATION-SERVICE
              predicates:
                - Path=/notification/**
              filters:
                - RewritePath=/notification/(?<segment>.*), /${segment}

            - id: search-service
              uri: lb://SEARCH-SERVICE
              predicates:
                - Path=/search/**
              filters:
                - RewritePath=/search/(?<segment>.*), /${segment}

            - id: analytics-service
              uri: lb://ANALYTICS-SERVICE
              predicates:
                - Path=/analytics/**
              filters:
                - RewritePath=/analytics/(?<segment>.*), /${segment}

    config:
      enabled: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost

