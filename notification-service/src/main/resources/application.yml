server:
  port: 8088
  forward-headers-strategy: framework

spring:
  application:
    name: 'notification-service'
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password: ''
  h2:
    console:
      enabled: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

  cloud:
    function:
      definition: handleNotification

    stream:
      bindings:
        handleNotification-in-0:
          destination: notification-topic
          group: notification-service
          consumer:
            max-attempts: 3

      kafka:
        binder:
          brokers: localhost:9092

        bindings:
          handleNotification-in-0:
            consumer:
              enable-dlq: true # Send to a DLQ topic if all 3 attempts fail
              dlq-name: notification-topic-dlq

    config:
      enabled: true
      fail-fast: true
      retry:
        initial-interval: 2000
        multiplier: 1.5
        max-interval: 10000
        max-attempts: 10
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
