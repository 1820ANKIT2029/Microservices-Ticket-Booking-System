server:
  port: 8092
  forward-headers-strategy: framework

spring:
  application:
    name: 'search-service'
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  cloud:
    config:
      enabled: true
      fail-fast: true
      retry:
        initial-interval: 2000
        multiplier: 1.5
        max-interval: 10000
        max-attempts: 10
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}

