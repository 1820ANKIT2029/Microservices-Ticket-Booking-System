server:
  port: 8092
  forward-headers-strategy: framework

spring:
  application:
    name: 'search-service'
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  cloud:
    config:
      enabled: true
      uri: "optional:configserver:http://localhost:8888/"
  config:
    import: optional:configserver:http://localhost:8888/

