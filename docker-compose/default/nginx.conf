# nginx.conf
user  nginx;
worker_processes  5;

events {
  worker_connections   1000;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  resolver 127.0.0.11 valid=10s;

  upstream my_gateway_cluster {
    least_conn;

    server gateway-server:8080;

    # Optional: Keep-alive connections for performance
    keepalive 32;
  }

  server {
    listen             80;

    # Serve the local static frontend files
    root /usr/share/nginx/html;
    index index.html;

    # --- Backend routing ---
    location ~ ^/[a-z-]+/api/ {
        proxy_pass http://my_gateway_cluster;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Auth routing ---
    location /auth/api/ {
        proxy_pass http://gateway-server:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Frontend routing (Next.js static export) ----
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}