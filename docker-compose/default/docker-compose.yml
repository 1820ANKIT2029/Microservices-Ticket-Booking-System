version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      # Force JVM to use exactly 128MB of heap
      KAFKA_HEAP_OPTS: "-Xmx128m -Xms128m"
    deploy:
      resources:
        limits:
          memory: 256M # Hard Docker container limit

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      # Drastically reduce Kafka JVM heap (Default is usually 1GB)
      KAFKA_HEAP_OPTS: "-Xmx256m -Xms256m"
    deploy:
      resources:
        limits:
          memory: 512M # Prevents Kafka from aggressively caching to host OS RAM

  redis:
    image: redis:7-alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    # Added strict 50MB internal limit and an LRU eviction policy
    command: redis-server --save 60 1 --loglevel warning --maxmemory 50mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  redis-data:
    driver: local